name: StepBack
options:
  minimumXcodeGenVersion: 2.43.0
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    DEVELOPMENT_TEAM: "$(STEPBACK_TEAM_ID)"
packages:
  StepBackCore:
    path: StepBackCore
targets:
  StepBack:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: StepBack
        excludes:
          - Info.plist
          - Info.macOS.plist
    resources:
      - path: StepBack/Resources
    dependencies:
      - package: StepBackCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nags.stepback
        PRODUCT_NAME: StepBack
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: StepBack/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: StepBack/StepBack.entitlements
  StepBackMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: StepBack
        excludes:
          - Info.plist
          - Info.macOS.plist
    resources:
      - path: StepBack/Resources
    dependencies:
      - package: StepBackCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nags.stepback
        PRODUCT_NAME: StepBack
        INFOPLIST_FILE: StepBack/Info.macOS.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: StepBack/StepBackMac.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) STEPBACK_MAC"
  StepBackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - StepBackTests
    dependencies:
      - target: StepBack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nags.stepback.tests
        GENERATE_INFOPLIST_FILE: "YES"
  StepBackUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - StepBackUITests
    dependencies:
      - target: StepBack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nags.stepback.uitests
        GENERATE_INFOPLIST_FILE: "YES"
  StepBackMacUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - StepBackMacUITests
    dependencies:
      - target: StepBackMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nags.stepback.macuitests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  StepBack:
    build:
      targets:
        StepBack: all
    test:
      config: Debug
      targets:
        - StepBackTests
        - StepBackUITests
  StepBackMac:
    build:
      targets:
        StepBackMac: all
    test:
      config: Debug
      targets:
        - StepBackMacUITests
